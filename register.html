<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de usuario - Soundly</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/script.js"></script>
</head>
<body>

    <div style="text-align: center; padding-top: 20px;">
        <a href="home.html" class="brand-centered" aria-label="Soundly - inicio">
            <img src="images/soundly-logo-2048px.png" alt="Logo de Soundly" width="40" height="40">
            <span class="brand-title">Soundly</span>
        </a>
    </div>

    <main class="login-container">
        <form action="#" method="POST">
            <h2>Registrate para empezar a escuchar</h2>

            <label>Correo electrónico</label>
            <input type="email" name="email" placeholder="Ingrese su correo" required>

            <label>Nombre de usuario</label>
            <input type="text" name="username" placeholder="Ingrese su usuario" required>

            <label>Contraseña</label>
            <input type="password" name="password" placeholder="Ingrese su contraseña" required>

            <label>Confirmar contraseña</label>
            <input type="password" name="confirmPassword" placeholder="Repita su contraseña" required>

            <label>Fecha de nacimiento</label>
            <input type="date" name="birthdate" required>

            <label>Género</label>
            <select name="gender">
                <option value="">Seleccionar</option>
                <option value="male">Masculino</option>
                <option value="female">Femenino</option>
                <option value="other">Otro</option>
            </select>

            <div style="margin-bottom: 15px;">
                <input type="checkbox" required style="width: auto;">
                <label>Acepto los términos y condiciones</label>
            </div>

            <button type="submit">Registrarse</button>

            <p style="margin-top: 15px; text-align: center;">
                ¿Ya tenés cuenta? <a href="login.html">Iniciar sesión</a>
            </p>
        </form>
    </main>

</body>
</html>
