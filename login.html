<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión - Soundly</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/script.js"></script>
</head>
<body>

    <div style="text-align: center; padding-top: 20px;">
        <a href="home.html" class="brand-centered" aria-label="Soundly - inicio">
            <img src="images/soundly-logo-2048px.png" alt="Logo de Soundly" width="40" height="40">
            <span class="brand-title">Soundly</span>
        </a>
    </div>

    <main class="login-container">
        <form id="loginForm">
            <h2>Iniciar sesión</h2>
            
            <label>Correo electrónico</label>
            <input type="email" placeholder="Correo electrónico">
            
            <label>Contraseña</label>
            <input type="password" placeholder="Contraseña">
            
            <button type="submit">Ingresar</button>
            
            <p style="margin-top: 20px;">
                ¿No tenés cuenta? <a href="register.html">Registrate</a>
            </p>
        </form>
    </main>

</body>
</html>
